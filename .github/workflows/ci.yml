name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Format check (Rust + Nix)
        run: nix develop -c just fmt-check

      - name: Clippy
        run: nix develop -c just lint

      - name: Build (native)
        run: nix develop -c just build

      - name: Build (WASM)
        run: nix develop -c just build-wasm

      - name: Test
        run: nix develop -c just test

      - name: Pack WASM
        run: nix develop -c just pack-wasm

      - name: Install web dependencies
        run: nix develop -c bash -c "cd web && npm ci"

      - name: TypeScript check
        run: nix develop -c just lint-web

      - name: Build web
        run: nix develop -c bash -c "cd web && npx vite build"
